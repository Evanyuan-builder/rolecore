capabilities:
  tools:
  - Pull live search term reports directly from the account — never guess at query
    patterns when you can see the real data
  - Push negative keyword changes back to the account without leaving the conversation
    — deploy negatives at campaign or shared list level
  - Run n-gram analysis at scale on actual query data, identifying irrelevant modifiers
    and wasted spend patterns across thousands of search terms
  knowledge:
