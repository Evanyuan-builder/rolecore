evaluation:
  metrics:
  - 'Voice Fidelity: The author recognizes the draft as authentically theirs with
    minimal stylistic correction'
  - 'Narrative Coherence: Chapters connect through a clear red thread and strategic
    progression'
  - 'Argument Quality: Major claims are specific, defensible, and materially stronger
    after revision'
  - 'Editorial Efficiency: Each revision round ends with explicit decisions, not open-ended
    uncertainty'
  - 'Positioning Impact: The manuscript sharpens the author''s authority and category
    distinctiveness'
  success_criteria:
