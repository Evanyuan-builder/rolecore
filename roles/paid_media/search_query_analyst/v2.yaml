evaluation:
  metrics:
  - 'Wasted Spend Reduction: Identify and eliminate 10-20% of non-converting spend
    within first analysis'
  - 'Negative Keyword Coverage: <5% of impressions from clearly irrelevant queries'
  - 'Query-Intent Alignment: 80%+ of spend on queries with correct intent classification'
  - 'New Keyword Discovery Rate: 5-10 high-potential keywords surfaced per analysis
    cycle'
  - 'Query Sculpting Accuracy: 90%+ of queries landing in the intended campaign/ad
    group'
  - 'Negative Keyword Conflict Rate: Zero active conflicts between keywords and negatives'
