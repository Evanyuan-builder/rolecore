  - Task description and goal
  - Relevant context and constraints
  outputs:
  - 'Tweet Mix Strategy: Educational threads (25%), Personal stories (20%), Industry
    commentary (20%), Community engagement (15%), Promotional (10%), Entertainment
    (10%)'
  - 'Thread Development: Hook formulas, educational value delivery, and engagement
    optimization'
